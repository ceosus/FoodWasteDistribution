{% extends 'base.html' %}

{% block title %}Login | FWD{% endblock %}

{% block content %}
<section class="mx-auto max-w-md">
    <div class="auth-card rounded-2xl border border-slate-200 bg-white p-6 shadow-lg shadow-slate-200/50 md:p-8">
        <h1 class="text-2xl font-bold tracking-tight text-slate-900">Welcome Back</h1>
        <p class="mt-2 text-sm text-slate-500">Log in to continue distributing food responsibly.</p>

        <form method="post" class="mt-6 space-y-4">
            <div>
                <label for="username" class="mb-1 block text-sm font-semibold">Username</label>
                <input id="username" name="username" type="text" required class="w-full rounded-lg border border-slate-300 px-3 py-2 outline-none ring-emerald-200 transition focus:border-emerald-500 focus:ring" placeholder="your_username">
            </div>
            <div>
                <label for="password" class="mb-1 block text-sm font-semibold">Password</label>
                <input id="password" name="password" type="password" required class="w-full rounded-lg border border-slate-300 px-3 py-2 outline-none ring-emerald-200 transition focus:border-emerald-500 focus:ring" placeholder="********">
            </div>
            <button type="submit" class="w-full rounded-lg bg-gradient-to-r from-emerald-600 to-emerald-500 px-4 py-2 font-semibold text-white shadow-lg shadow-emerald-300/40 hover:from-emerald-700 hover:to-emerald-600">
                Login
            </button>
        </form>

        <p class="mt-4 text-center text-sm text-slate-600">
            New user?
            <a class="font-semibold text-emerald-600 hover:text-emerald-700" href="{{ url_for('register') }}">Create an account</a>
        </p>
    </div>
</section>
{% endblock %}
