{% extends 'base.html' %}

{% block title %}Register | FWD{% endblock %}

{% block content %}
<section class="mx-auto max-w-2xl">
    <div class="auth-card rounded-2xl border border-slate-200 bg-white p-6 shadow-lg shadow-slate-200/50 md:p-8">
        <h1 class="text-2xl font-bold tracking-tight text-slate-900">Create Account</h1>
        <p class="mt-2 text-sm text-slate-500">Register as a donor or NGO to start coordinating food redistribution.</p>

        <form method="post" class="mt-6 grid grid-cols-1 gap-4 md:grid-cols-2">
            <div class="md:col-span-1">
                <label for="username" class="mb-1 block text-sm font-semibold">Username</label>
                <input id="username" name="username" type="text" required class="w-full rounded-lg border border-slate-300 px-3 py-2 outline-none ring-blue-200 transition focus:border-blue-500 focus:ring" placeholder="username">
            </div>
            <div class="md:col-span-1">
                <label for="password" class="mb-1 block text-sm font-semibold">Password</label>
                <input id="password" name="password" type="password" required class="w-full rounded-lg border border-slate-300 px-3 py-2 outline-none ring-blue-200 transition focus:border-blue-500 focus:ring" placeholder="********">
            </div>

            <div class="md:col-span-1">
                <label for="role" class="mb-1 block text-sm font-semibold">Role</label>
                <select id="role" name="role" required class="w-full rounded-lg border border-slate-300 px-3 py-2 outline-none ring-blue-200 transition focus:border-blue-500 focus:ring">
                    <option value="">Select role</option>
                    <option value="donor">Donor</option>
                    <option value="ngo">NGO</option>
                </select>
            </div>
            <div class="md:col-span-1">
                <label for="organization_name" class="mb-1 block text-sm font-semibold">Organization Name</label>
                <input id="organization_name" name="organization_name" type="text" required class="w-full rounded-lg border border-slate-300 px-3 py-2 outline-none ring-blue-200 transition focus:border-blue-500 focus:ring" placeholder="Organization">
            </div>

            <div class="md:col-span-1">
                <label for="location" class="mb-1 block text-sm font-semibold">Location</label>
                <input id="location" name="location" type="text" required class="w-full rounded-lg border border-slate-300 px-3 py-2 outline-none ring-blue-200 transition focus:border-blue-500 focus:ring" placeholder="City / Area">
            </div>
            <div class="md:col-span-1">
                <label for="contact" class="mb-1 block text-sm font-semibold">Contact</label>
                <input id="contact" name="contact" type="text" required class="w-full rounded-lg border border-slate-300 px-3 py-2 outline-none ring-blue-200 transition focus:border-blue-500 focus:ring" placeholder="Phone or email">
            </div>

            <div class="md:col-span-2">
                <button type="submit" class="w-full rounded-lg bg-gradient-to-r from-blue-600 to-cyan-500 px-4 py-2 font-semibold text-white shadow-lg shadow-blue-300/40 hover:from-blue-700 hover:to-cyan-600">
                    Register
                </button>
            </div>
        </form>

        <p class="mt-4 text-center text-sm text-slate-600">
            Already registered?
            <a class="font-semibold text-blue-600 hover:text-blue-700" href="{{ url_for('login') }}">Login here</a>
        </p>
    </div>
</section>
{% endblock %}
