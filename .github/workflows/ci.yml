name: CI

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-test.txt

      - name: Run unit tests
        env:
          MONGO_SERVER_SELECTION_TIMEOUT_MS: "100"
        run: python -m pytest tests/unit -vv -ra

      - name: Run integration tests
        env:
          MONGO_SERVER_SELECTION_TIMEOUT_MS: "100"
        run: python -m pytest tests/integration -vv -ra

      - name: Run system tests
        env:
          MONGO_SERVER_SELECTION_TIMEOUT_MS: "100"
        run: python -m pytest tests/system -vv -ra

      - name: Run acceptance tests
        env:
          MONGO_SERVER_SELECTION_TIMEOUT_MS: "100"
        run: python -m pytest tests/acceptance -vv -ra
