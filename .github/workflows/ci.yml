name: CI

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-test.txt

      - name: Prepare reports folder
        run: mkdir -p reports

      - name: Run unit tests
        env:
          MONGO_SERVER_SELECTION_TIMEOUT_MS: "100"
        run: python -m pytest tests/unit -vv -ra --junitxml=reports/unit.xml

      - name: Run integration tests
        env:
          MONGO_SERVER_SELECTION_TIMEOUT_MS: "100"
        run: python -m pytest tests/integration -vv -ra --junitxml=reports/integration.xml

      - name: Run system tests
        env:
          MONGO_SERVER_SELECTION_TIMEOUT_MS: "100"
        run: python -m pytest tests/system -vv -ra --junitxml=reports/system.xml

      - name: Run acceptance tests
        env:
          MONGO_SERVER_SELECTION_TIMEOUT_MS: "100"
        run: python -m pytest tests/acceptance -vv -ra --junitxml=reports/acceptance.xml

      - name: Publish test case summary table
        if: always()
        run: |
          python - <<'PY'
          import os
          import xml.etree.ElementTree as ET

          reports = [
            "reports/unit.xml",
            "reports/integration.xml",
            "reports/system.xml",
            "reports/acceptance.xml",
          ]

          metadata = {
            "tests.acceptance.test_user_journeys::test_guest_is_redirected_from_protected_dashboard": (
              "Protected Route",
              "Guest accesses donor dashboard",
              "Redirect to login page",
            ),
            "tests.acceptance.test_user_journeys::test_donor_user_story_register_login_and_reach_dashboard": (
              "User Login",
              "Valid donor credentials",
              "Login success and donor dashboard access",
            ),
            "tests.acceptance.test_user_journeys::test_ngo_cannot_access_donor_dashboard": (
              "Role Authorization",
              "NGO accesses donor dashboard",
              "Access denied and redirect",
            ),
            "tests.integration.test_auth_flow::test_register_login_logout_flow": (
              "User Login",
              "Register + valid credentials + logout",
              "Auth flow works with secure session handling",
            ),
            "tests.system.test_listing_lifecycle::test_full_listing_lifecycle_from_donor_to_ngo": (
              "Request Food",
              "Valid donor listing and NGO claim sequence",
              "Listing progresses available -> claimed -> collected",
            ),
            "tests.unit.test_helpers::test_parse_expiry_valid_value": (
              "Add Food",
              "Valid expiry datetime string",
              "Expiry parsed as UTC datetime",
            ),
            "tests.unit.test_helpers::test_parse_expiry_invalid_value": (
              "Add Food",
              "Invalid expiry datetime string",
              "Validation error (None)",
            ),
            "tests.unit.test_helpers::test_parse_donation_price_rules": (
              "Add Food",
              "Donation prices: valid, zero, negative, non-numeric",
              "Only valid positive price accepted",
            ),
            "tests.unit.test_helpers::test_parse_coordinates_requires_both_values": (
              "Add Food",
              "Missing latitude or longitude",
              "Validation error for missing coordinates",
            ),
            "tests.unit.test_helpers::test_parse_coordinates_success_and_rounding": (
              "Add Food",
              "Valid latitude and longitude",
              "Coordinates accepted and rounded",
            ),
            "tests.unit.test_helpers::test_quick_chatbot_reply_for_guest_login_status": (
              "Chatbot",
              "Guest asks login status",
              "Guest-friendly login guidance shown",
            ),
            "tests.unit.test_helpers::test_format_chatbot_answer_limits_lines": (
              "Chatbot",
              "Answer with more than 4 lines",
              "Output truncated to 4 lines",
            ),
          }

          rows = []
          total = 0
          passed = 0

          for report_path in reports:
            if not os.path.exists(report_path):
              continue
            root = ET.parse(report_path).getroot()
            for testcase in root.iter("testcase"):
              total += 1
              classname = testcase.attrib.get("classname", "")
              name = testcase.attrib.get("name", "")
              nodeid = f"{classname}::{name}" if classname else name
              nodeid_path_style = f"{classname.replace('.', '/')}.py::{name}" if classname else name

              failed = testcase.find("failure") is not None or testcase.find("error") is not None
              skipped = testcase.find("skipped") is not None
              if failed:
                result = "Failed"
              elif skipped:
                result = "Skipped"
              else:
                result = "Passed"
                passed += 1

              test_case, test_input, expected = metadata.get(nodeid) or metadata.get(
                nodeid_path_style,
                ("General Test", nodeid, "Behavior is validated as expected"),
              )
              rows.append((test_case, test_input, expected, result))

          summary_path = os.environ.get("GITHUB_STEP_SUMMARY")
          if not summary_path:
            raise SystemExit(0)

          with open(summary_path, "a", encoding="utf-8") as summary:
            summary.write("## Test Cases\n\n")
            summary.write("| Test Case | Input | Expected Output | Result |\n")
            summary.write("|---|---|---|---|\n")
            for row in rows:
              escaped = [str(col).replace("|", "\\|") for col in row]
              summary.write(f"| {escaped[0]} | {escaped[1]} | {escaped[2]} | {escaped[3]} |\n")
            summary.write(f"\n**Summary:** {passed}/{total} tests passed.\n")
          PY
